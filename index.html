<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gianna Kai — Kaspi Магазин</title>
<meta property="og:title" content="Gianna Kai в Kaspi Магазине">
<meta property="og:description" content="Нажмите, чтобы открыть каталог Gianna Kai в Kaspi">
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f6f8;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:20px;padding:32px 24px;max-width:340px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.08);margin:16px}
  .logo{width:64px;height:64px;border-radius:16px;background:#f14635;color:#fff;font-size:30px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  h1{font-size:20px;margin:0 0 8px}
  p{color:#667085;font-size:14px;line-height:1.5;margin:0 0 20px}
  .btn{display:block;background:#f14635;color:#fff;text-decoration:none;padding:14px;border-radius:12px;font-weight:600;font-size:16px}
  .hint{margin-top:18px;font-size:12px;color:#98a2b3;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="logo">K</div>
  <h1>Gianna Kai</h1>
  <p>Открываем каталог в Kaspi Магазине…</p>
  <a class="btn" id="openBtn" href="#">Открыть в Kaspi</a>
  <div class="hint" id="iosHint" style="display:none">
    Если не открылось: нажмите <b>⋯</b> в правом верхнем углу и выберите <b>«Открыть в браузере»</b>
  </div>
</div>

<script>
(function(){
  var TARGET = "https://kaspi.kz/shop/search/?text=gianna%20kai";
  var ua = navigator.userAgent || "";
  var isAndroid = /android/i.test(ua);
  var isIOS = /iphone|ipad|ipod/i.test(ua);
  var inApp = /instagram|fbav|fban|fb_iab/i.test(ua);

  // Android intent-ссылка: выбрасывает из встроенного браузера Instagram в Chrome,
  // а Chrome уже сам откроет приложение Kaspi (universal link)
  var androidIntent = "intent://kaspi.kz/shop/search/?text=gianna%20kai#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" + encodeURIComponent(TARGET) + ";end";

  var btn = document.getElementById("openBtn");

  if (isAndroid && inApp) {
    btn.href = androidIntent;
    // автопопытка через полсекунды
    setTimeout(function(){ window.location.href = androidIntent; }, 400);
  } else if (isIOS && inApp) {
    // iOS не позволяет программно выйти из встроенного браузера —
    // показываем подсказку и обычную ссылку (Kaspi откроется по universal link после выхода)
    btn.href = TARGET;
    document.getElementById("iosHint").style.display = "block";
    setTimeout(function(){ window.location.href = TARGET; }, 400);
  } else {
    // обычный браузер — просто редирект
    btn.href = TARGET;
    window.location.replace(TARGET);
  }
})();
</script>
</body>
</html>
